<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Exam Registration Portal</title>

<!-- ============================= -->
<!-- EXTERNAL CSS (Simulated) -->
<!-- Normally in style.css -->
<!-- ============================= -->
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
    margin: 0;
    padding: 0;
}

.container {
    width: 420px;
    margin: 60px auto;
    background-color: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    color: #203a43;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #aaa;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 18px;
    background-color: #2c5364;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #1b3b4f;
}
</style>

<!-- ============================= -->
<!-- EMBEDDED CSS -->
<!-- ============================= -->
<style>
.note {
    color: red;
    text-align: center;
    font-size: 14px;
}

.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: gray;
}
</style>

</head>

<body>

<div class="container">

<h1>Exam Registration</h1>

<!-- INLINE CSS -->
<p style="text-align:center; color:green; font-weight:bold;">
Register before deadline
</p>

<form>

<label>Student Name</label>
<input type="text" placeholder="Enter full name" required>

<label>Register Number</label>
<input type="text" placeholder="Enter register number" required>

<label>Email</label>
<input type="email" placeholder="Enter email" required>

<label>Department</label>
<select>
    <option>AIML</option>
    <option>CSE</option>
    <option>IT</option>
    <option>ECE</option>
    <option>EEE</option>
</select>

<label>Semester</label>
<select>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option>6</option>
</select>

<label>Exam Type</label>
<select>
    <option>Internal</option>
    <option>Model</option>
    <option>Semester</option>
</select>

<p class="note">All fields are mandatory</p>

<button type="submit">Register</button>

</form>

<div class="footer">
© 2026 Online Exam System
</div>

</div>

</body>
</html>
